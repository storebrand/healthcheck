name: Build and Publish to Maven Central

# Uploads to the Sonatype Central Publishing Portal via the com.vanniktech.maven.publish
# plugin. SNAPSHOT versions are published directly to the Central snapshot repo. Release
# versions land in a staging deployment and require a manual "Publish" click at
# https://central.sonatype.com — see PublishToMaven.md for the full release procedure.

on:
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Build with Gradle
        run: ./gradlew clean build publishToMavenCentral
        env:
          # Central Portal user token — generate at https://central.sonatype.com under
          # "View Account" → "Generate User Token". Must be a Portal token; OSSRH tokens
          # will return 401.
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          # ASCII-armored GPG signing key (gpg --export-secret-keys --armor <keyid>) and
          # its short key id + passphrase.
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.CENTRAL_SIGNINGKEYID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.CENTRAL_SIGNINGPASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.CENTRAL_SIGNINGKEY }}
